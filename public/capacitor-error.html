<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AniFlex unavailable</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070413;
        --panel: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #00f5d4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: var(--panel);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #071013;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AniFlex is unavailable</h1>
      <p>Check your connection or set CAPACITOR_SERVER_URL to the deployed AniFlex site before building the Android app.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
